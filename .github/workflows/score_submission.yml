name: Score Submission

on:
  pull_request_target:
    paths:
      - submissions/encrypted/**
    types:
      - opened
      - synchronize
      - reopened

jobs:
  score:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      issues: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Checkout PR files
        run: |
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr-branch
          git checkout pr-branch -- submissions/encrypted/
          git checkout main 2>/dev/null || git checkout -
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'
      
      - name: Install dependencies
        run: pip install pandas scikit-learn numpy torch cryptography
      
      - name: Get submitter username
        id: user
        run: echo "username=${{ github.event.pull_request.user.login }}" >> $GITHUB_OUTPUT
      
      - name: Check one-submission rule
        id: check
        run: |
          if [ -f "docs/leaderboard.csv" ]; then
            if grep -q "^${{ steps.user.outputs.username }}," docs/leaderboard.csv; then
              echo "User already submitted"
              exit 1
            fi
          fi
        continue-on-error: true
      
      - name: Find encrypted file
        id: find
        if: steps.check.outcome == 'success'
        run: |
          FILE=$(find submissions/encrypted -name "*.enc" -type f 2>/dev/null | head -1)
          if [ -z "$FILE" ]; then
            echo "No .enc file found"
            exit 1
          fi
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "Found: $FILE"
      
      - name: Load private key
        if: steps.check.outcome == 'success'
        run: |
          echo "${{ secrets.PRIVATE_KEY }}" > encryption/private_key.pem
          chmod 600 encryption/private_key.pem
      
      - name: Decrypt submission
        id: decrypt
        if: steps.check.outcome == 'success'
        run: |
          python encryption/decrypt_submission.py "${{ steps.find.outputs.file }}" encryption/private_key.pem
          DECRYPTED="${{ steps.find.outputs.file }}"
          DECRYPTED="${DECRYPTED%.enc}_decrypted.csv"
          echo "csv=$DECRYPTED" >> $GITHUB_OUTPUT
        continue-on-error: true
      
      - name: Validate and Score
        id: score
        if: steps.decrypt.outcome == 'success'
        env:
          TEST_LABELS: ${{ secrets.TEST_LABELS }}
        run: |
          echo "$TEST_LABELS" > /tmp/ground_truth.csv
          RESULT=$(python scripts/scoring_script.py "${{ steps.decrypt.outputs.csv }}" "${{ steps.user.outputs.username }}" /tmp/ground_truth.csv 2>&1)
          echo "$RESULT"
          SCORE=$(echo "$RESULT" | grep "Score:" | tail -1 | awk '{print $NF}')
          
          if [ -z "$SCORE" ] || [ "$SCORE" = "nan" ] || [ "$SCORE" = "NaN" ]; then
            echo "Scoring failed - no valid score found"
            exit 1
          fi
          
          echo "score=$SCORE" >> $GITHUB_OUTPUT
        continue-on-error: true
      
      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f encryption/private_key.pem
          rm -f /tmp/ground_truth.csv
          rm -f "${{ steps.decrypt.outputs.csv }}"
      
      - name: Save to leaderboard CSV
        if: steps.score.outcome == 'success'
        run: |
          mkdir -p docs
          TIMESTAMP=$(date -u +"%Y-%m-%d")
          USERNAME="${{ steps.user.outputs.username }}"
          SCORE="${{ steps.score.outputs.score }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for i in 1 2 3 4 5; do
            # Always pull latest main before writing
            git fetch origin main
            git reset --hard origin/main

            # Re-checkout the encrypted submission (lost after reset)
            git fetch origin pull/${{ github.event.pull_request.number }}/head:pr-branch
            git checkout pr-branch -- submissions/encrypted/

            # Write to leaderboard
            if [ ! -f "docs/leaderboard.csv" ]; then
              echo "team,score,model,date,notes" > docs/leaderboard.csv
            fi

            # Skip if user already exists (race condition guard)
            if grep -q "^${USERNAME}," docs/leaderboard.csv; then
              echo "Already in leaderboard, skipping."
              break
            fi

            echo "${USERNAME},${SCORE},GNN,${TIMESTAMP},${USERNAME}" >> docs/leaderboard.csv

            git add docs/leaderboard.csv
            git commit -m "Add submission for ${USERNAME}"

            if git push origin HEAD:main; then
              echo "✅ Push succeeded on attempt $i"
              break
            else
              echo "Push failed, retrying in 5s (attempt $i/5)..."
              sleep 5
            fi
          done
      
      - name: Get rank
        id: rank
        if: steps.score.outcome == 'success'
        run: |
          python3 << 'PYEOF'
          import pandas as pd
          import os
          import sys

          try:
              # Pull latest leaderboard after push
              df = pd.read_csv('docs/leaderboard.csv')
              df['score'] = pd.to_numeric(df['score'], errors='coerce')
              df = df.dropna(subset=['score'])
              df = df.sort_values('score', ascending=False)
              df['rank'] = range(1, len(df) + 1)

              username = "${{ steps.user.outputs.username }}"
              match = df[df['team'] == username]

              if match.empty:
                  print(f"User {username} not found in leaderboard")
                  sys.exit(1)

              user_rank = int(match['rank'].values[0])

              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f"rank={user_rank}\n")

          except Exception as e:
              print(f"Error calculating rank: {e}")
              sys.exit(1)
          PYEOF
      
      - name: Comment Score
        if: steps.score.outcome == 'success' && steps.rank.outcome == 'success'
        uses: actions/github-script@v6
        with:
          script: |
            const score = '${{ steps.score.outputs.score }}';
            const rank = '${{ steps.rank.outputs.rank }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 🎯 Submission Scored Successfully!\n\n'
                + '**Your Results:**\n'
                + '- 📊 **F1-Score:** `' + score + '`\n'
                + '- 🏆 **Rank:** #' + rank + '\n\n'
                + '---\n\n'
                + '### 🔒 Security Process:\n'
                + '✅ Encrypted on your machine\n'
                + '✅ Decrypted securely in GitHub Actions\n'
                + '✅ Scored against hidden test labels\n'
                + '✅ Immediately deleted (no trace)\n\n'
                + '**Your predictions remain 100% private!**\n\n'
                + '---\n\n'
                + '⚠️ **Important:** This was your **ONE** allowed submission.\n\n'
                + '📊 [View Leaderboard](../blob/main/LEADERBOARD.md)'
            });
      
      - name: Comment if already submitted
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## ❌ Already Submitted\n\nOnly **ONE** submission per participant.\n\nYour previous submission stands as your final entry.'
            });
      
      - name: Comment if decryption failed
        if: steps.decrypt.outcome == 'failure'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## ❌ Decryption Failed\n\nYour file could not be decrypted. This attempt does **not** count.\n\n**Fix:**\n```bash\npython encryption/encrypt_submission.py submissions/your_predictions.csv\n```\n\nClose this PR and open a new one with the fresh file.'
            });
      
      - name: Comment if scoring failed
        if: steps.score.outcome == 'failure' && steps.decrypt.outcome == 'success'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## ❌ Scoring Failed\n\nDecryption succeeded but scoring failed. This attempt does **not** count.\n\n**Possible reasons:**\n- Ground truth labels not configured in GitHub Secrets\n- Invalid submission format\n\n**Required format:**\n```csv\nnode_id,prediction\n0,1\n1,0\n...\n38,0\n```\n\nExactly 39 rows, `node_id` 0-38, `prediction` 0 or 1 only.'
            });
